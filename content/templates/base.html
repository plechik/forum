<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    {% block title %}
    {% endblock %}
    </title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url("{% static 'img/background.webp' %}") no-repeat center / cover fixed;
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
        }
    </style>
    {% block css %}{% endblock %}
</head>
<body>
    <header>
        {% include 'partials/navbar.html' %}
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    {% block js %}{% endblock %}
</body>
</html>
